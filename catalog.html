<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo PWA - Nexus Shop</title>
  <!-- Google Fonts: Outfit & Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Boxicons for modern icons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f19">
</head>
<body class="dark-theme">

  <!-- BACKGROUND DECORATIONS -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- MAIN APP CONTAINER -->
  <div class="app-container catalog-standalone-container">
    
    <!-- HEADER NAVBAR -->
    <header class="app-header">
      <div class="header-logo">
        <a href="./" class="action-btn" title="Volver al Chat" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">
          <i class="bx bx-chevron-left"></i>
        </a>
        <div class="logo-text">
          <h1>NEXUS <span class="accent-text">SHOP</span></h1>
          <p>Catálogo Digital Autoadministrable</p>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="header-actions">
        <button class="cart-toggle-btn" id="btn-cart-toggle">
          <i class="bx bx-shopping-bag"></i>
          <span class="cart-badge" id="cart-counter">0</span>
        </button>
      </div>
    </header>

    <!-- CONTENT VIEWS (CATALOG GRID ONLY) -->
    <main class="app-content catalog-standalone-content">
      <div class="card glass-card catalog-card" style="height: 100%;">
        
        <div class="catalog-header">
          <div class="search-bar">
            <i class="bx bx-search search-icon"></i>
            <input type="text" id="catalog-search" placeholder="Buscar productos...">
          </div>
        </div>

        <!-- Promociones Grid (Hidden by default) -->
        <div id="promos-container" style="display: none; margin: 0 15px 20px 15px; padding: 15px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-glass); border-radius: var(--border-radius-md);">
          <h3 style="font-size: 1.05rem; color: var(--color-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700;">
            <i class="bx bx-gift"></i> Promociones Especiales
          </h3>
          <div class="promos-slider" id="promos-slider" style="display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin;">
            <!-- Rendered dynamically -->
          </div>
        </div>

        <!-- Category tabs -->
        <div class="category-tabs" id="catalog-categories">
          <button class="category-tab active" data-category="all">Todos</button>
          <button class="category-tab" data-category="comida">Comidas</button>
          <button class="category-tab" data-category="bebida">Bebidas</button>
          <button class="category-tab" data-category="postre">Postres</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="catalog-products-grid">
          <!-- Products dynamically rendered here -->
        </div>
      </div>
    </main>

    <!-- SHOPPING CART SLIDE DRAWER -->
    <div class="cart-drawer-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
      <div class="cart-drawer-header">
        <h2>Mi Carrito</h2>
        <button class="close-btn" id="btn-cart-close">
          <i class="bx bx-x"></i>
        </button>
      </div>

      <div class="cart-items-list" id="cart-items-container">
        <!-- Cart items rendered dynamically -->
        <div class="empty-cart-msg">
          <i class="bx bx-cart-alt"></i>
          <p>Tu carrito está vacío</p>
        </div>
      </div>

      <div class="cart-footer">
        <div class="cart-totals">
          <div class="total-row">
            <span>Subtotal:</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <div class="total-row">
            <span>Envío a domicilio:</span>
            <span id="cart-shipping" class="text-success">Gratis</span>
          </div>
          <div class="total-row grand-total">
            <span>Total:</span>
            <span id="cart-total">$0.00</span>
          </div>
        </div>

        <div class="checkout-form">
          <input type="text" id="checkout-name" placeholder="Tu Nombre Completo *" required>
          <input type="text" id="checkout-phone" placeholder="Celular / WhatsApp *" required>
          <input type="text" id="checkout-address" placeholder="Dirección de entrega * (o 'Retiro en Local')">
        </div>

        <div id="min-delivery-warning" style="display: none; color: var(--color-danger); font-size: 0.8rem; font-weight: 700; margin: 8px 0; text-align: center; background: rgba(235, 94, 85, 0.1); border: 1px solid rgba(235, 94, 85, 0.2); border-radius: 4px; padding: 6px;"></div>

        <button class="primary-btn checkout-btn" id="btn-checkout-submit">
          <i class="bx bx-check-double"></i> Confirmar Pedido y Enviar al Bot
        </button>
      </div>
    </div>

  </div>

  <script type="module" src="catalog-app.js"></script>
</body>
</html>
